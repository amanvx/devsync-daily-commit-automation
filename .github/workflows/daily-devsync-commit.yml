name: Daily DevSync Commit

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Track daily activity for 24f2008471@ds.study.iitm.ac.in
        run: echo "Daily automated activity logged at $(date)" >> activity_log.txt

      - name: Commit and push changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2008471@ds.study.iitm.ac.in"
          git add activity_log.txt
          git commit -m "Automated daily DevSync commit" || exit 0
          git push
